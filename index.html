<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Happy Valentine for you 💖</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Overlay untuk trigger musik -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-content">
      <h2>💖 Happy Valentine for you 💖</h2>
      <p>✨ Klik di mana saja untuk membuka ✨</p>
    </div>
  </div>

  <div class="card">
    <h1>Happy Valentine 💐</h1>
    <p>
      Hari ini resmi jadi pengingat bahwa senyum itu penting.
      Entah dirayakan besar-besaran atau biasa saja,<br>
      semoga tetap ada tawa kecil yang bikin hari terasa lebih ringan.
    </p>

    <a href="https://ig.me/m/rubuu_2" target="_blank" class="reply-btn">
      <span>Balas 💌</span>
    </a>
  </div>

  <div class="music-indicator" id="musicIndicator">
    <div class="music-bars">
      <span></span>
      <span></span>
      <span></span>
    </div>
    Musik sedang diputar
  </div>

  <audio id="bg-music" loop>
    <source src="sound.mp3" type="audio/mpeg">
  </audio>

  <!-- JS di-load paling akhir -->
  <script src="script.js"></script>
</body>
</html>
